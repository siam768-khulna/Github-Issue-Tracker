<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="bg-white shadow">
      <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
        <div class="flex items-center gap-2">
          <img src="./assets/github-logo.png" class="w-6" />

          <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-3">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="border px-4 py-2 rounded w-60"
          />
          <button class="bg-purple-600 text-white px-4 py-2 rounded">
            + New Issue
          </button>
        </div>
      </div>
    </nav>
    <!-- TAB SECTION -->
    <div class="max-w-6xl mx-auto mt-10">
      <div class="bg-white p-4 rounded-lg shadow flex gap-3">
        <button
          id="allTab"
          class="tab-btn bg-purple-600 text-white px-6 py-2 rounded"
        >
          All
        </button>

        <button id="openTab" class="tab-btn border px-6 py-2 rounded">
          Open
        </button>
        <button id="closedTab" class="tab-btn border px-6 py-2 rounded">
          Closed
        </button>
      </div>
    </div>

    <!-- ISSUE HEADER -->
    <div
      class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded shadow flex justify-between"
    >
      <div class="flex items-center gap-3">
        <div class="bg-purple-100 p-2 rounded-full">
          <img src="./assets/aperture.png" class="w-5" />
        </div>

        <div>
          <h2 class="font-bold text-lg">50 Issues</h2>

          <p class="text-gray-500 text-sm">
            Track and manage your project issues
          </p>
        </div>
      </div>

      <div class="flex gap-5 text-sm">
        <span class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>

          Open
        </span>

        <span class="flex items-center gap-2">
          <div class="w-3 h-3 bg-purple-500 rounded-full"></div>

          Closed
        </span>
      </div>
    </div>

    <!-- ISSUES CONTAINER -->

    <div
      id="issuesContainer"
      class="max-w-6xl mx-auto mt-6 grid grid-cols-4 gap-6"
    ></div>

    <script src="tabs.js"></script>
  </body>
</html>
